server {
    listen 80;
    server_name denuncia-ambiental.devverse.win;

    # Needed for Certbot verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name denuncia-ambiental.devverse.win;

    # SSL Certificates (Certbot will place them here)
    ssl_certificate /etc/letsencrypt/live/denuncia-ambiental.devverse.win/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/denuncia-ambiental.devverse.win/privkey.pem;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000" always;

    resolver 127.0.0.11 valid=30s;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $backend "http://api:3000";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tiles/ {
        set $tiles "http://map-server:8080";
        proxy_pass $tiles;
        proxy_set_header Host $host;
    }
}
