server {
    listen 80;
    server_name denuncia-ambiental.devverse.win;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name denuncia-ambiental.devverse.win;

    ssl_certificate /etc/letsencrypt/live/denuncia-ambiental.devverse.win/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/denuncia-ambiental.devverse.win/privkey.pem;

    # Optimization for 2026 standards
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    resolver 127.0.0.11 valid=30s;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy: Preserves /api/ prefix because Go code expects it
    location /api/ {
        set $backend "http://api:3000";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Tiles Proxy: Strips /tiles/ so map-server gets "chile.pmtiles"
    location /tiles/ {
        set $tiles "http://map-server:80";
        rewrite ^/tiles/(.*) /$1 break;
        proxy_pass $tiles;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # PMTiles requires byte-range requests and exposed headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Range' always;
        add_header Access-Control-Expose-Headers 'Content-Length, Content-Range' always;
        
        # Preflight OPTIONS optimization
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Range' always;
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain charset=UTF-8';
            add_header Content-Length 0;
            return 204;
        }
    }
}
