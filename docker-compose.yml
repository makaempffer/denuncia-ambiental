services:
  # 1. PostGIS Database
  db:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_DB: denuncia_db
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/seed:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d denuncia_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Go API Backend
  api:
    build: ./backend
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy

  # 3. PMTiles Server (Protomaps)
  map-server:
    image: protomaps/go-pmtiles
    restart: always
    volumes:
      - ./data/map:/data
    command: serve /data

  # 4. React Frontend (Nginx Gateway)
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
      map-server:
        condition: service_started

volumes:
  postgres_data:
