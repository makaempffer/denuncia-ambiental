services:
  db:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_DB: denuncia_db
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/seed:/docker-entrypoint-initdb.d

  api:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASS}@db:5432/denuncia_db
    depends_on:
      - db

  map-server:
    image: protomaps/go-pmtiles
    restart: always
    volumes:
      - ./data/map:/data
    command: serve /data

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - map-server

volumes:
  postgres_data:
